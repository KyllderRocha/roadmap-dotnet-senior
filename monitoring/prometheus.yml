global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'users-api'
    static_configs:
      - targets: ['users-api:5221']

  - job_name: 'tasks-api'
    static_configs:
      - targets: ['tasks-api:5115']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']