name: .NET CI/CD

on:
  push:
    branches: [ "feat-fase-2" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x # Mude para a sua versão se for diferente

      # MUDANÇA 1: Executar os comandos dotnet dentro da pasta correta
      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./fase-2-task-manager-clean # <--- ADICIONADO

      - name: Build
        run: dotnet build --no-restore
        working-directory: ./fase-2-task-manager-clean # <--- ADICIONADO

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # MUDANÇA 2: Dizer ao Docker onde encontrar o Dockerfile e o código
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./fase-2-task-manager-clean # <--- ALTERADO
          file: ./fase-2-task-manager-clean/Dockerfile # <--- ADICIONADO
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}